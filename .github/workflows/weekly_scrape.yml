name: Weekly Education Policy Scrape

on:
  schedule:
    # Every Friday at 06:00 UTC
    - cron: '0 6 * * 5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Calculate week dates
        id: dates
        run: |
          # Current Friday = until_date
          UNTIL=$(date +%Y-%m-%d)
          # Previous Saturday = since_date (7 days back)
          SINCE=$(date -d "$UNTIL - 6 days" +%Y-%m-%d)
          # Week number (weeks since 2026-01-08)
          EPOCH="2026-01-08"
          DAYS=$(( ($(date -d "$UNTIL" +%s) - $(date -d "$EPOCH" +%s)) / 86400 ))
          WEEK=$(( DAYS / 7 + 1 ))
          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "until=$UNTIL" >> $GITHUB_OUTPUT
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "Scraping week $WEEK: $SINCE → $UNTIL"

      - name: Scrape England
        working-directory: src
        run: python run.py --country eng --since ${{ steps.dates.outputs.since }} --until ${{ steps.dates.outputs.until }} --week ${{ steps.dates.outputs.week }}

      - name: Scrape Ireland
        working-directory: src
        run: python run.py --country irl --since ${{ steps.dates.outputs.since }} --until ${{ steps.dates.outputs.until }} --week ${{ steps.dates.outputs.week }}

      - name: Scrape Scotland
        working-directory: src
        run: python run.py --country sco --since ${{ steps.dates.outputs.since }} --until ${{ steps.dates.outputs.until }} --week ${{ steps.dates.outputs.week }}

      - name: Push to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python src/seed_supabase.py --week ${{ steps.dates.outputs.week }}

      - name: Summary
        run: |
          echo "## Weekly Scrape Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Week:** ${{ steps.dates.outputs.week }}" >> $GITHUB_STEP_SUMMARY
          echo "**Period:** ${{ steps.dates.outputs.since }} → ${{ steps.dates.outputs.until }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Articles scraped:" >> $GITHUB_STEP_SUMMARY
          for f in data/inference/*/week${{ steps.dates.outputs.week }}_*.csv; do
            if [ -f "$f" ]; then
              COUNT=$(tail -n +2 "$f" | wc -l)
              echo "- **$(basename $(dirname $f))**: $COUNT articles" >> $GITHUB_STEP_SUMMARY
            fi
          done
